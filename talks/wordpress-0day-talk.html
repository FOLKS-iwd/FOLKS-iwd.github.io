<h1 id="step-4-key-vulnerability-patterns">Step 4: Key Vulnerability Patterns</h1>
<hr />
<table>
<thead>
<tr>
<th>Code Pattern</th>
<th>Bug Class</th>
<th>Severity</th>
<th>What to look for</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>$wpdb-&gt;query(&quot;...&quot;.$var.&quot;...&quot;)</code></td>
<td><span style="color:#f85149">SQLi</span></td>
<td><span style="color:#f85149;font-weight:bold">● HIGH</span></td>
<td>Raw concat instead of <code>$wpdb-&gt;prepare()</code></td>
</tr>
<tr>
<td><code>echo $settings['attr']</code></td>
<td><span style="color:#f0883e">Stored XSS</span></td>
<td><span style="color:#f0883e;font-weight:bold">● MEDIUM</span></td>
<td>No <code>esc_html/esc_attr</code> before output</td>
</tr>
<tr>
<td><code>'permission_callback'=&gt;'__return_true'</code></td>
<td><span style="color:#f85149">Auth Bypass</span></td>
<td><span style="color:#f85149;font-weight:bold">● HIGH</span></td>
<td>REST route open to everyone, even guests</td>
</tr>
<tr>
<td><code>wp_remote_get($_GET['url'])</code></td>
<td><span style="color:#e3b341">SSRF</span></td>
<td><span style="color:#e3b341;font-weight:bold">● MEDIUM</span></td>
<td>User controls the URL, use <code>wp_safe_remote_get</code></td>
</tr>
<tr>
<td><code>wp_verify_nonce()</code> missing</td>
<td><span style="color:#e3b341">CSRF</span></td>
<td><span style="color:#e3b341;font-weight:bold">● MEDIUM</span></td>
<td>State-changing action with no nonce check</td>
</tr>
<tr>
<td><code>unserialize($_COOKIE['data'])</code></td>
<td><span style="color:#d2a8ff">Object Injection</span></td>
<td><span style="color:#d2a8ff;font-weight:bold">● CRITICAL</span></td>
<td>Any <code>unserialize()</code> on user-controlled input</td>
</tr>
<tr>
<td><code>current_user_can()</code> missing</td>
<td><span style="color:#f85149">Privilege Esc.</span></td>
<td><span style="color:#f85149;font-weight:bold">● HIGH</span></td>
<td>Subscriber/contributor doing admin-only actions</td>
</tr>
</tbody>
</table>
<p><em>Rule: user input → sensitive sink with no sanitization in between = candidate.</em></p>
</section>

<h1 id="semgrep-rule-example-detecting-sqli">Semgrep Rule Example: Detecting SQLi</h1>
<hr />
<p>Here is an example rule that catches raw string concatenation inside <code>$wpdb-&gt;query()</code>:</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">rules:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">id:</span> <span class="hljs-string">wordpress-sqli-wpdb-query</span>  <span class="hljs-comment"># unique name for this rule</span>
    <span class="hljs-attr">languages:</span> [<span class="hljs-string">php</span>]               <span class="hljs-comment"># target language</span>
    <span class="hljs-attr">severity:</span> <span class="hljs-string">ERROR</span>                <span class="hljs-comment"># how loud semgrep shouts when it matches</span>
    <span class="hljs-attr">message:</span> <span class="hljs-string">&quot;Possible SQLi: $wpdb-&gt;query() called with unsanitized input. Use $wpdb-&gt;prepare().&quot;</span>
    <span class="hljs-attr">patterns:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">pattern:</span> <span class="hljs-string">$wpdb-&gt;query(&quot;...&quot;</span> <span class="hljs-string">.</span> <span class="hljs-string">$VAR</span> <span class="hljs-string">.</span> <span class="hljs-string">&quot;...&quot;</span><span class="hljs-string">)</span>  <span class="hljs-comment"># match: string + variable concat</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">pattern-not:</span> <span class="hljs-string">$wpdb-&gt;query($wpdb-&gt;prepare(...))</span>  <span class="hljs-comment"># ignore already-safe calls</span>
    <span class="hljs-attr">metadata:</span>
      <span class="hljs-attr">cwe:</span> <span class="hljs-string">CWE-89</span>       <span class="hljs-comment"># maps to the official SQLi weakness ID</span>
      <span class="hljs-attr">confidence:</span> <span class="hljs-string">HIGH</span>  <span class="hljs-comment"># tells your triage pipeline how noisy this rule is</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">semgrep --config my-rules/sqli.yaml ./plugin-folder/
</code></pre>
</section>

<h1 id="cve-2025-68999-what-is-the-bug">CVE-2025-68999: What Is the Bug?</h1>
<hr />
<p><strong>The &quot;Happy Clone&quot; feature</strong> lets users duplicate posts. When cloning, the plugin copies all custom fields, including the field <strong>name</strong> (meta_key). That name goes straight into the database query <strong>without any sanitization.</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-php"><span class="hljs-comment">// VULNERABLE: Happy Clone copies post meta like this (≤ 3.20.4)</span>

<h1 id="cve-2025-68999-proof-of-concept-12">CVE-2025-68999: Proof of Concept (1/2)</h1>
<hr />
<p><strong>Requirements:</strong> Author account · reported 24 Dec 2025, patched 23 Jan 2026</p>
<ol>
<li>Install Happy Addons ≤ 3.20.4, login as <strong>Author</strong></li>
<li>Create a post, publish it</li>
<li>Enable <strong>Custom Fields</strong> via Preferences → Panels</li>
<li>Add a custom field with this as the <strong>Name</strong>:</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql">pwned<span class="hljs-string">&#x27;, (SELECT user_pass FROM wp_users LIMIT 1)), (9999, &#x27;</span>x

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-sql"><span class="hljs-keyword">INSERT INTO</span> wp_postmeta (post_id, meta_key, meta_value)

</code></pre>
<p>Our input closes the first row, injects a second row with <code>SELECT user_pass</code> as the value, then opens a dummy third row to keep the SQL syntax valid.</p>

<h1 id="cve-2026-2600-what-is-the-bug">CVE-2026-2600: What Is the Bug?</h1>
<hr />
<p><strong>Plugin:</strong> ElementsKit Elementor Addons · <strong>2M+ active installs</strong></p>
<p>The <strong>Simple Tab widget</strong> lets users build tabbed content. Each tab has a title (<code>ekit_tab_title</code>). That title is stored inside Elementor's post meta (<code>_elementor_data</code>) and <strong>rendered on the frontend without any HTML escaping.</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-php"><span class="hljs-comment">// VULNERABLE: tab title echoed raw (≤ 3.7.9)</span>
<span class="hljs-keyword">echo</span> <span class="hljs-string">&#x27;&lt;div class=&quot;ekit-tab-title&quot;&gt;&#x27;</span> . <span class="hljs-variable">$tab</span>[<span class="hljs-string">&#x27;ekit_tab_title&#x27;</span>] . <span class="hljs-string">&#x27;&lt;/div&gt;&#x27;</span>;
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-php"><span class="hljs-comment">// FIXED (3.8.0): sanitized before output</span>
<span class="hljs-keyword">echo</span> <span class="hljs-string">&#x27;&lt;div class=&quot;ekit-tab-title&quot;&gt;&#x27;</span> . <span class="hljs-title function_ invoke__">esc_html</span>( <span class="hljs-variable">$tab</span>[<span class="hljs-string">&#x27;ekit_tab_title&#x27;</span>] ) . <span class="hljs-string">&#x27;&lt;/div&gt;&#x27;</span>;
</code></pre>
<p><strong>The twist:</strong> you don't inject through the Elementor editor UI.<br />
You inject directly through the <strong>WordPress REST API</strong>, writing raw JSON into <code>_elementor_data</code>.<br />
Any Contributor can do this on their own posts.</p>

<h1 id="cve-2026-2600-proof-of-concept-22">CVE-2026-2600: Proof of Concept (2/2)</h1>
<hr />
<p><strong>Why it works:</strong></p>
<ul>
<li>The REST API accepts post meta updates from any Contributor</li>
<li>The Elementor editor UI sanitizes on save - but we never go through the editor</li>
<li>We write raw JSON directly into <code>_elementor_data</code> in the database</li>
<li>When the page renders, <code>ekit_tab_title</code> is echoed with no <code>esc_html()</code> - browser executes it</li>
</ul>
<ol start="3">
<li>Visit the post on the frontend, payload fires for <strong>every visitor</strong></li>
</ol>
<p><strong>Impact:</strong> session hijacking · admin takeover · site defacement · CVSS 6.4 MEDIUM</p>

<h1 id="patchstack-you-compete-for-a-monthly-prize-pool">Patchstack: You Compete for a Monthly Prize Pool</h1>
<hr />
<p>Every month, Patchstack puts <strong>at least $8,800</strong> on the table and splits it between the top researchers.</p>
<p><strong>You earn XP points for every valid bug you report. XP decides your rank. Rank decides your payout.</strong></p>
<p>How your XP is calculated:</p>
<table>
<thead>
<tr>
<th>Factor</th>
<th>Example</th>
<th>Multiplier</th>
</tr>
</thead>
<tbody>
<tr>
<td>CVSS score (how bad the bug is)</td>
<td>Score 8.0</td>
<td>base</td>
</tr>
<tr>
<td>How many sites use the plugin</td>
<td>500K installs</td>
<td><span style="color:#7ee787;font-weight:bold">x4</span></td>
</tr>
<tr>
<td>Who can trigger it</td>
<td>No login needed</td>
<td><span style="color:#7ee787;font-weight:bold">x2</span></td>
</tr>
<tr>
<td>Type of bug</td>
<td>SQL Injection</td>
<td><span style="color:#7ee787;font-weight:bold">x2</span></td>
</tr>
</tbody>
</table>
<blockquote>
<p>One good unauthenticated SQLi in a popular plugin = a lot of XP</p>
</blockquote>
<p><strong>Minimum CVSS to qualify: 6.5</strong> (low severity bugs are not accepted)</p>
