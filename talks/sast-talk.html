<p>Every scanner finds the same 20 bugs.<br />

<strong>0 papers</strong> on business logic vulnerability detection</p>

<h2 id="what-the-research-says">What the research says</h2>
<p>15 papers read. Same gap in all of them.</p>
<ul>
<li><strong><a href="https://arxiv.org/abs/2405.17238">IRIS</a></strong> (ICLR 2025) - LLM generates CodeQL taint specs. 2x more findings. Still <strong>Java only</strong>.</li>
<li><strong><a href="https://arxiv.org/abs/2510.02534">ZeroFalse</a></strong> (2025) - CWE-specific prompts hit F1=0.912. <strong>Collapses to 0.372 on real code</strong>.</li>
<li><strong><a href="https://arxiv.org/abs/2601.22952">Sifting the Noise</a></strong> (2026) - FP rate 92% → 6%. <strong>Suppresses 22% of real vulns</strong>.</li>
<li><strong><a href="https://arxiv.org/abs/2601.18844">Tencent</a></strong> (2026) - 94-98% FP elimination. <strong>Fails on cascaded constraints</strong>.</li>
<li><strong><a href="https://arxiv.org/abs/2604.01637">SecLens</a></strong> (2026) - Same model scores <strong>31 points apart</strong> for CISO vs engineer.</li>
<li><strong><a href="https://aclanthology.org/2025.acl-long.562/">PwnGPT</a></strong> (ACL 2025) - Attack chain gen 26% → <strong>57.9%</strong> on CTF. Never tested on real apps.</li>
</ul>
<p><strong>The gap no paper solves: business logic + cross-file chains + stakeholder-aware output.</strong></p>

<h2 id="six-core-modules">Six core modules</h2>
<p><strong>L1 - Intent Extractor</strong><br />
Reads PR title, description, linked tickets. Builds a natural language spec of what this code <em>should</em> do.</p>
<p><strong>L2 - Behavior Extractor</strong><br />
Reads actual code diff. Builds a formal model of what this code <em>actually</em> does.</p>
<p><strong>L3 - Delta Detector</strong><br />
Compares intent vs behavior. Flags every gap - this is where business logic flaws live.</p>
<p><strong>L4 - Chain Builder</strong><br />
Connects findings across files and services. Single IDOR (CVSS 4.3) chained to stored XSS + admin session = CVSS 9.1.</p>
<p><strong>L5 - PoC Generator</strong><br />
Produces a runnable script per critical finding. Analyst confirms exploitability before anything reaches a developer.</p>
<p><strong>L6 - Compliance Tagger</strong><br />
Tags every finding to GDPR Art.32, PCI DSS 6.3, SOC2 CC7, ISO 27001, and DORA Art.9/25/28. Powers the CISO dashboard.</p>
</section>

<th>#</th>
<th>Category</th>
<th>Detection</th>
</tr>
</thead>
<tbody>
<tr>
<td>A01</td>
<td><a href="https://owasp.org/Top10/A01_2021-Broken_Access_Control/">Broken Access Control</a></td>
<td>Intent vs behavior delta, missing authz checks</td>
</tr>
<tr>
<td>A02</td>
<td><a href="https://owasp.org/Top10/A02_2021-Cryptographic_Failures/">Cryptographic Failures</a></td>
<td>MD5/SHA1/DES, hardcoded keys, HTTP for sensitive data</td>
</tr>
<tr>
<td>A03</td>
<td><a href="https://owasp.org/Top10/A03_2021-Injection/">Injection</a></td>
<td>Taint: user input → SQL/LDAP/OS/template sink</td>
</tr>
<tr>
<td>A04</td>
<td><a href="https://owasp.org/Top10/A04_2021-Insecure_Design/">Insecure Design</a></td>
<td>Missing rate-limit decorators, no CSRF on state-change routes</td>
</tr>
<tr>
<td>A05</td>
<td><a href="https://owasp.org/Top10/A05_2021-Security_Misconfiguration/">Security Misconfiguration</a></td>
<td>debug=True, CORS *, default creds, permissive perms</td>
</tr>
<tr>
<td>A06</td>
<td><a href="https://owasp.org/Top10/A06_2021-Vulnerable_and_Outdated_Components/">Vulnerable Components</a></td>

</tr>
<tr>
<td>A07</td>
<td><a href="https://owasp.org/Top10/A07_2021-Identification_and_Authentication_Failures/">Auth Failures</a></td>
<td>JWT alg:none, session fixation, weak token entropy</td>
</tr>
<tr>
<td>A08</td>
<td><a href="https://owasp.org/Top10/A08_2021-Software_and_Data_Integrity_Failures/">Integrity Failures</a></td>
<td>unsafe deserialization: pickle, yaml.load, unserialize</td>
</tr>
<tr>
<td>A09</td>
<td><a href="https://owasp.org/Top10/A09_2021-Security_Logging_and_Monitoring_Failures/">Logging Failures</a></td>
<td>PII in logs, missing audit on auth events</td>
</tr>
<tr>
<td>A10</td>
<td><a href="https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/">SSRF</a></td>
<td>Taint: user input → HTTP request without allowlist</td>
</tr>
</tbody>
</table>

<h2 id="ide-integration">IDE Integration</h2>
<p>The scan starts before the PR. Developers see findings while they type, not after they push.</p>
<p><strong>Supported editors:</strong></p>
<ul>
<li>VS Code extension</li>
<li>JetBrains plugin (IntelliJ, PyCharm, WebStorm, GoLand)</li>
<li>Neovim via LSP protocol</li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Dev writes this in VS Code:
  cursor = db.execute(&quot;SELECT * FROM users WHERE id = &quot; + user_id)
                                                              ↑
  <img class="emoji" draggable="false" alt="⚠" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> SAST [A03 Injection] SQLi via string concatenation
    Fix: use parameterized query → db.execute(&quot;... WHERE id = ?&quot;, [user_id])
    CVSS: 8.1 High  |  CWE-89  |  [ See fix ]  [ Ignore ]
</code></pre>
<p><strong>What the IDE plugin does:</strong></p>
<ul>
<li>Real-time scan on file save - no waiting for CI</li>
<li>Inline annotation at the exact vulnerable line</li>
<li>One-click fix suggestion with explanation</li>
<li>If finding is part of a known chain - shows the chain context</li>
<li>Does NOT send code to any server - runs the fast local model (<code>llama3.2:3b</code>) for instant feedback</li>
</ul>
<p><strong>Why it matters:</strong><br />
Finding a bug before commit costs minutes to fix. Finding it at PR review costs hours. Finding it in production costs days - and your reputation.</p>

<p>For confirmed, high-confidence findings, the tool opens a fix PR automatically. No analyst needed, no ticket, no waiting.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Scan completes on PR #412
  Finding: hardcoded API key in config.py (CVSS 7.5 High, confidence: 99%)
  ↓
  Auto-fix PR #413 opened against the same branch:

  - config.py:
  -   API_KEY = &quot;sk-prod-a8f2c...&quot;
  +   API_KEY = os.environ.get(&quot;API_KEY&quot;)

  Title: &quot;[SAST Auto-fix] Remove hardcoded API key - config.py:14&quot;
  Labels: security, auto-fix, high
  Reviewers: @security-champion-team-backend
</code></pre>
<p><strong>Rules for auto-fix:</strong></p>
<ul>
<li>Only fires on <strong>high-confidence, single-line fixes</strong> - secrets, hardcoded creds, weak crypto, debug flags</li>
<li>Never auto-fixes business logic or chain findings - those need analyst judgment</li>
<li>Security champion is always tagged as reviewer - human eyes before merge</li>
<li>If auto-fix PR is ignored for 48h - escalates to analyst as a normal ticket</li>
<li>All auto-fixes logged with confidence score and LLM reasoning in audit trail</li>
</ul>

<h2 id="the-branch-mindset---risk-mitigation-not-quality">The branch mindset - risk mitigation, not quality</h2>
<p>Most SAST tools ask: <strong>&quot;is this code good?&quot;</strong><br />
This tool asks: <strong>&quot;can an attacker do something real with this if it ships?&quot;</strong></p>
<p>That single shift changes everything about how scans behave.</p>
<table>
<thead>
<tr>
<th>Mindset</th>
<th>What it flags</th>
<th>What happens</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Quality</strong></td>
<td>Code smells, style, complexity, coverage</td>
<td>Devs mute it in a week</td>
</tr>
<tr>
<td><strong>Risk mitigation</strong></td>
<td>Exploitable paths, chains, real attack surfaces</td>
<td>Devs listen because every alert is real</td>
</tr>
</tbody>
</table>
<p><strong>The rule:</strong></p>
<ul>
<li>If no attacker can do anything meaningful with this code - pass silently, say nothing</li>
<li>If an attacker can do something meaningful - block, explain the attack, show the chain</li>
</ul>
<p>Silence is a signal too. When the tool is quiet, the team trusts it. When it fires, they act.</p>

<h2 id="branch-behavior---different-gates-different-rules">Branch behavior - different gates, different rules</h2>
<p>Not every branch carries the same risk. The tool knows the difference.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>FEATURE BRANCH (dev/feature/*)
  Scan runs on every push
  Findings: inline warnings only, no tickets, no blocks
  Goal: shift-left education - catch it before PR, not after

  ↓ developer opens PR targeting main/staging

PR → MAIN / STAGING
  Full scan: all 6 layers, chain detection, PoC generation
  Critical chain detected → PR BLOCKED, analyst notified
  High finding detected → PR BLOCKED (configurable)
  Medium/Low → inline comment, SLA started, no block
  Goal: this is the real gate - nothing exploitable ships

  ↓ somehow slips through (override, accepted risk)

MAIN / MASTER (post-merge monitoring)
  Continuous background scan on every commit
  Re-evaluates existing findings for new chain combinations
  New Critical on main → immediate alert to analyst + security manager
  Goal: catch anything that slipped, never go blind after merge

HOTFIX BRANCH (hotfix/*)
  Full scan runs but NEVER auto-blocks
  Findings flagged loudly to security team
  Override allowed with one-click + mandatory justification
  Audit trail kept permanently
  Goal: don't stop a critical production fix - but log everything

SANDBOX / DEV ENVIRONMENT
  Scan runs, findings logged to database only
  Zero tickets, zero alerts, zero noise
  Data feeds the LLM training corpus
  Goal: learn the codebase patterns without interrupting anyone
</code></pre>

<h2 id="why-this-matters-in-practice">Why this matters in practice</h2>
<p>The mistake every other SAST makes: <strong>they apply the same rules everywhere.</strong></p>
<p>Block everything on every branch = devs create workarounds, bypass the tool, or disable it entirely.<br />
Warn everywhere = alert fatigue, nobody reads it, real findings drown in noise.</p>
<p><strong>This tool treats each branch as a different moment in the developer's workflow:</strong></p>
<ul>
<li><strong>Feature branch</strong> = thinking mode. Don't interrupt, just leave a sticky note.</li>
<li><strong>PR gate</strong> = decision point. This is when risk gets evaluated seriously.</li>

<li><strong>Hotfix</strong> = emergency. Trust the team, log everything, stay out of the way.</li>
<li><strong>Sandbox</strong> = learning. Silent data collection, zero friction.</li>
</ul>

<strong>The code is the same. The context is everything.</strong></p>

<h2 id="pr-merge-blocking---how-it-works">PR merge blocking - how it works</h2>
<p>When a scan detects a Critical or High chain, the PR is blocked from merging until it is resolved.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Dev opens PR #412 - scan runs automatically
  ↓
Chain detected: IDOR [A] + XSS [B] = CVSS 9.1 Critical
  ↓
GitHub/GitLab status check set to FAILED
  ↓
  ✗  sast/chain-check - &quot;Critical chain detected: A+B → admin takeover&quot;
     PR cannot be merged until this is resolved.
</code></pre>
<p><strong>What unblocks the PR:</strong></p>
<ul>
<li>The chain link is fixed and re-scan passes</li>
<li>A security lead overrides the block with a documented justification (audit trail kept)</li>
<li>Finding is marked &quot;accepted risk&quot; by an authorized reviewer - logged permanently</li>
</ul>
<p><strong>Configurable per company rules:</strong></p>
<ul>
<li>Choose which severity levels block merge (e.g. Critical only, or Critical + High)</li>
<li>Exclude specific branches (e.g. hotfix branches can bypass with override)</li>
<li>Set a grace period for Low/Medium findings - warn but do not block</li>
</ul>
</section>

<h2 id="per-project-risk-context">Per-project risk context</h2>
<p>Not every repository carries the same business risk. A finding in an internal tool is not the same as the same finding in a public-facing payment API.</p>
<p>Companies can tag each project with a <strong>risk context profile</strong>:</p>
<table>
<thead>
<tr>
<th>Profile tag</th>
<th>What it means</th>
<th>Effect on scoring</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>exposed-assets</code></td>
<td>Service is public-facing, internet-accessible</td>
<td>Severity tier upgraded by one level</td>
</tr>
<tr>
<td><code>sensitive-data</code></td>
<td>Handles PII, health records, or payment data</td>
<td>SLA halved, mandatory analyst review</td>
</tr>
<tr>
<td><code>internal-only</code></td>
<td>No external access, behind VPN</td>
<td>Severity calculated at standard CVSS</td>
</tr>
<tr>
<td><code>critical-infra</code></td>
<td>Auth service, payment processor, core API</td>
<td>Chain findings auto-escalate to Critical</td>
</tr>
<tr>
<td><code>sandbox</code></td>
<td>Dev/test environment, no real data</td>
<td>Findings logged only, no tickets fired</td>
</tr>
</tbody>
</table>
<p><strong>Profiles are defined once by the security team and applied per repo.</strong> CVSS stays the same - only the business priority changes.</p>
</section>

<h2 id="it-ticket-risk---your-matrix-not-ours">IT ticket risk - your matrix, not ours</h2>
<p>IT receives a ticket from the security team. The priority shown is <strong>not the raw CVSS score</strong> - it is translated into your company's own language.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>  Security team (internal):
    Finding: hardcoded AWS key in deployment script
    CVSS: 9.1  Critical  &lt;- identification and classification only

  IT ticket (what IT receives):
    Risk level: HIGH  &lt;- your company's risk matrix
    Priority:   P2    &lt;- your internal priority tiers
    Action:     rotate key, audit usage, patch pipeline
    SLA:        48h   &lt;- your IT SLA policy
</code></pre>
<p><strong>CVSS is the tool's language. Your matrix is the business's language.</strong></p>
<ul>
<li>Security team triages, confirms, and decides what reaches IT</li>
<li>IT works with familiar P1/P2/P3 or RAG tiers - not security scores</li>
<li>Matrix is fully configurable: exposure weight, data sensitivity, service criticality</li>
<li>IT never accesses the dashboard - they only act on assigned tickets</li>
</ul>
</section>

<h2 id="developer-view--what-they-see">Developer view — what they see</h2>
<p><strong>Before their first ticket:</strong> a short onboarding quiz (10 questions, CWE basics, company security policy). One-time only. Unlocks access to the ticket inbox. Not per finding - just once when they join the platform.</p>
<p>Once an analyst confirms and opens a ticket, the dev gets:</p>
<ul>
<li>Exact file and line number</li>
<li>Plain English explanation, no jargon</li>
<li>Fix recommendation with a code snippet in their framework</li>
<li>Auto-generated unit test that reproduces the bug</li>
<li>SLA countdown — configurable per company rules</li>
<li>Ticket auto-closes when fix is merged and re-scan passes</li>
</ul>
<p>No raw PoC. No attack chain. No other devs' findings. Clean, focused, actionable.</p>
</section>

<h2 id="developer-tickets---created-by-the-analyst">Developer tickets - created by the analyst</h2>
<p>The analyst reviews the finding, runs the PoC, confirms it is real, then manually creates the Jira ticket and assigns it to the dev. Nothing reaches the dev without human confirmation.</p>
<p><strong>What the dev sees in Jira — and nothing else:</strong></p>
<ul>
<li>The ticket assigned to them by the analyst</li>
<li>Vulnerability name and affected file/line</li>
<li>Plain English description of the risk</li>
<li>False positive likelihood indicator</li>
<li>Fix recommendation and code snippet</li>
<li>SLA deadline</li>
</ul>
<p><strong>What the dev cannot see:</strong></p>
<ul>
<li>Other developers' tickets</li>
<li>Raw scan results or finding list</li>
<li>PoC scripts or exploit details</li>
<li>Attack chain or CVSS chain score</li>
<li>Any other security findings not assigned to them</li>
</ul>
<p>The dev's entire security view is one inbox: tickets from the security team, nothing more.</p>
</section>

<h2 id="dora-compliance">DORA Compliance</h2>
<p><a href="https://www.eiopa.europa.eu/digital-operational-resilience-act-dora_en">Digital Operational Resilience Act</a> — in force January 17, 2025. Mandatory for all EU financial entities.</p>
<table>
<thead>
<tr>
<th>DORA Article</th>
<th>Requirement</th>
<th>How we cover it</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Art. 8</strong></td>
<td>Identify and document ICT vulnerabilities</td>
<td>Continuous scan inventory across all repos, every PR</td>
</tr>
<tr>
<td><strong>Art. 9(4)(c)</strong></td>
<td>ICT security policies for the development cycle</td>
<td>SAST enforces secure coding gates before any code ships</td>
</tr>
<tr>
<td><strong>Art. 9(4)(d)</strong></td>
<td>Mechanisms to detect anomalous activities</td>
<td>Finding detection on every commit, chain-aware anomaly scoring</td>
</tr>
<tr>
<td><strong>Art. 10</strong></td>
<td>Prompt detection and response to ICT incidents</td>
<td>SLA breach alerts, auto-escalation, analyst case management</td>
</tr>
<tr>
<td><strong>Art. 25</strong></td>
<td>Threat-Led Penetration Testing (TLPT) evidence</td>
<td>Auto-generated PoC per finding serves as reproducible TLPT evidence</td>
</tr>
<tr>
<td><strong>Art. 28(4)(a)</strong></td>
<td>ICT third-party risk management</td>
<td>Dependency CVE scan with EPSS scoring on every build</td>
</tr>
</tbody>
</table>
<p><strong>Why this matters for sales:</strong><br />
Every bank, insurer, and investment firm in the EU must comply or face fines up to 1% of global daily turnover.<br />
DORA requires documented evidence of testing - our PoC output IS that evidence.</p>

<h2 id="poc-generation">PoC Generation</h2>
<p>For every critical/high finding, the system generates a runnable PoC.</p>
<p><strong>IDOR example:</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-python"><span class="hljs-comment"># Auto-generated by SAST - CVE candidate</span>
<span class="hljs-comment"># Demonstrates: user A can read user B&#x27;s data</span>

session = requests.Session()
session.post(<span class="hljs-string">&quot;/login&quot;</span>, json={<span class="hljs-string">&quot;user&quot;</span>: <span class="hljs-string">&quot;attacker&quot;</span>, <span class="hljs-string">&quot;pass&quot;</span>: <span class="hljs-string">&quot;test&quot;</span>})

<p>Analyst runs it, confirms exploitability, attaches to ticket.<br />

* { font-family: 'Inter', sans-serif; box-sizing: border-box; }
section {
  background: #0a0a0f;
  color: #e0e0f0;
  padding: 52px 64px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
section::after {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: #444466;
  content: attr(data-marpit-pagination) ' / ' attr(data-marpit-pagination-total);
}
h1 {
  font-size: 1.7em;
  font-weight: 900;
  line-height: 1.1;
  background: linear-gradient(135deg, #e0e0f0 0%, #00ff88 60%, #00ccff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 0.3em;
}
h2 {
  font-size: 1.1em;
  font-weight: 800;
  color: #00ff88;
  margin-bottom: 0.4em;
  border-bottom: 1px solid #1a1a3e;
  padding-bottom: 0.2em;
}
h3 {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.65em;
  color: #00ccff;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 0.6em;
}
p { font-size: 0.72em; color: #c0c0d8; line-height: 1.6; }
ul { padding-left: 1.2em; }
li { color: #c0c0d8; font-size: 0.68em; line-height: 1.7; }
li strong { color: #e0e0f0; }
code {
  font-family: 'JetBrains Mono', monospace;
  background: #161625;
  color: #00ff88;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.85em;
}
pre {
  background: #0d0d1a;
  border: 1px solid #1a1a3e;
  border-radius: 10px;
  padding: 14px 18px;
  font-size: 0.58em;
  line-height: 1.5;
}
pre code {
  background: none;
  color: #00ff88;
  padding: 0;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.82em;
}
th {
  background: linear-gradient(90deg, #0d1f2d 0%, #0a1a2a 100%);
  color: #00ccff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.62em;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 11px 16px;
  border-top: 2px solid #00ccff;
  border-bottom: 2px solid #00ccff;
  border-left: 1px solid #0d2233;
  border-right: 1px solid #0d2233;
}
td {
  padding: 7px 14px;
  border: 1px solid #141428;
  color: #c0c0d8;
  vertical-align: top;
  font-size: 0.65em;
}
tr:nth-child(odd) td  { background: #0d0d1a; }
tr:nth-child(even) td { background: #111122; }
tr:hover td { background: #0a1f30; color: #e0e0f0; }
.accent { color: #00ff88; font-weight: 700; }
.blue { color: #00ccff; font-weight: 700; }
.red { color: #ff6b6b; font-weight: 700; }
.gold { color: #ffd700; font-weight: 700; }
.dim { color: #555577; font-size: 0.8em; }
.tag {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.7em;
  padding: 2px 10px;
  border-radius: 4px;
  margin-right: 6px;
  font-weight: 700;
}
.tag-green { background: rgba(0,255,136,0.12); color: #00ff88; border: 1px solid rgba(0,255,136,0.25); }
.tag-blue  { background: rgba(0,204,255,0.12); color: #00ccff; border: 1px solid rgba(0,204,255,0.25); }
.tag-red   { background: rgba(255,107,107,0.12); color: #ff6b6b; border: 1px solid rgba(255,107,107,0.25); }
.tag-gold  { background: rgba(255,215,0,0.12); color: #ffd700; border: 1px solid rgba(255,215,0,0.25); }
.card {
  background: #111120;
  border: 1px solid #1a1a3e;
  border-radius: 10px;
  padding: 18px 22px;
  margin: 8px 0;
}
section.cover { justify-content: center; align-items: flex-start; }
section.cover h1 { font-size: 3em; }
section.divider { background: #050509; justify-content: center; align-items: center; text-align: center; }
section.divider h1 { font-size: 2.2em; }
